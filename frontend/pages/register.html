<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register | Fountain of Fire Ministry</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h3>Create Account</h3>
    <form id="registerForm">
      <div class="form-area">
        <input type="text" class="form-control" id="name" placeholder="Full Name" required>
      </div>
      <div class="form-area">
        <input type="email" class="form-control" id="email" placeholder="Email" required>
      </div>
      <div class="form-area">
        <input type="password" class="form-control" id="password" placeholder="Password (min 8 characters)" required minlength="8">
      </div>
      <button type="submit" class="contact__btn btn text-white auth-btn">Register</button>
      <div id="formMessage" class="auth-message"></div>
    </form>
    <div class="auth-links">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const messageEl = document.getElementById("formMessage");
    messageEl.textContent = "";
    messageEl.className = "auth-message";

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const response = await fetch(`${API_BASE}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password }),
      });
      const data = await response.json();

      if (!response.ok) {
        messageEl.textContent = data.error || "Registration failed";
        messageEl.classList.add("error");
        return;
      }

      messageEl.textContent = data.message;
      messageEl.classList.add("success");
      document.getElementById("registerForm").reset();
    } catch (err) {
      messageEl.textContent = "Something went wrong. Please try again.";
      messageEl.classList.add("error");
    }
  });
</script>

</body>
</html>
