<!DOCTYPE html>
<html lang="en">
<head>
  <title>Reset Password | Fountain of Fire Ministry</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h3>Reset Password</h3>
    <form id="resetForm">
      <div class="form-area">
        <input type="password" class="form-control" id="password" placeholder="New Password (min 8 characters)" required minlength="8">
      </div>
      <button type="submit" class="contact__btn btn text-white auth-btn">Reset Password</button>
      <div id="formMessage" class="auth-message"></div>
    </form>
    <div class="auth-links">
      <a href="login.html">Back to Login</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const messageEl = document.getElementById("formMessage");
    messageEl.textContent = "";
    messageEl.className = "auth-message";

    if (!token) {
      messageEl.textContent = "Missing reset token. Please use the link from your email.";
      messageEl.classList.add("error");
      return;
    }

    const password = document.getElementById("password").value;

    try {
      const response = await fetch(`${API_BASE}/auth/reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password }),
      });
      const data = await response.json();

      if (!response.ok) {
        messageEl.textContent = data.error || "Reset failed";
        messageEl.classList.add("error");
        return;
      }

      messageEl.textContent = data.message;
      messageEl.classList.add("success");
      setTimeout(() => (window.location.href = "login.html"), 1500);
    } catch (err) {
      messageEl.textContent = "Something went wrong. Please try again.";
      messageEl.classList.add("error");
    }
  });
</script>

</body>
</html>
