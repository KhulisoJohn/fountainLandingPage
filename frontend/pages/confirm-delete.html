<!DOCTYPE html>
<html lang="en">
<head>
  <title>Confirm Account Deletion | Fountain of Fire Ministry</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card text-center">
    <h3>Delete Account</h3>
    <p id="statusText">This will permanently delete your account. This cannot be undone.</p>
    <button id="confirmBtn" class="contact__btn btn text-white auth-btn">Confirm Deletion</button>
    <div class="auth-links">
      <a href="login.html">Cancel and go to Login</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const statusText = document.getElementById("statusText");
  const confirmBtn = document.getElementById("confirmBtn");

  if (!token) {
    statusText.textContent = "Missing confirmation token.";
    confirmBtn.disabled = true;
  }

  confirmBtn.addEventListener("click", async () => {
    confirmBtn.disabled = true;
    try {
      const response = await fetch(`${API_BASE}/auth/delete-account/confirm`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const data = await response.json();
      statusText.textContent = response.ok
        ? data.message
        : (data.error || "Deletion failed.");
      if (response.ok) {
        clearToken();
        localStorage.removeItem("fountain_user");
      } else {
        confirmBtn.disabled = false;
      }
    } catch (err) {
      statusText.textContent = "Something went wrong. Please try again.";
      confirmBtn.disabled = false;
    }
  });
</script>

</body>
</html>
